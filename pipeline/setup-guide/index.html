<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brelly — Map Pipeline Setup</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --surface-1: #13151f;
  --surface-2: #1a1d27;
  --surface-3: #1f2233;
  --border:    #2a2d3a;
  --text-1:    #f1f5f9;
  --text-2:    #e2e8f0;
  --text-3:    #94a3b8;
  --text-4:    #64748b;
  --text-5:    #4b5563;
  --amber:     #f59e0b;
  --amber-dim: #fbbf24;
  --green:     #34d399;
  --green-bg:  #0d1a12;
  --green-bdr: #1a3a25;
  --code-fg:   #a3e635;
  --code-bg:   #0d0f18;
  --sidebar-w: 240px;
  --topbar-h:  52px;
  --footer-h:  64px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text-2);
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  overflow: hidden;
}

/* ── Top bar ── */
#topbar {
  height: var(--topbar-h);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
#topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--amber);
}
#topbar-title span { color: var(--text-3); font-weight: 400; }

#os-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-3);
}
#os-badge strong { color: var(--text-2); }
#os-switch-btn {
  color: var(--amber);
  background: none;
  border: none;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  padding: 0;
}
#os-badge { display: none; }

/* ── Body ── */
#app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--surface-1);
  border-right: 1px solid var(--border);
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  display: none;
}
.sidebar-section-label {
  padding: 16px 16px 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-5);
}
#progress-wrap {
  margin: 4px 16px 0;
  background: var(--surface-3);
  border-radius: 99px;
  height: 4px;
}
#progress-fill {
  height: 4px;
  border-radius: 99px;
  background: var(--amber);
  width: 0%;
  transition: width 0.3s ease;
}
#progress-label {
  margin: 6px 16px 12px;
  font-size: 11px;
  color: var(--text-5);
}
#step-list { list-style: none; }
.step-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s;
}
.step-item:hover { background: var(--surface-2); }
.step-item.active {
  background: var(--surface-3);
  border-left-color: var(--amber);
}
.step-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--text-5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-4);
  flex-shrink: 0;
}
.step-item.active .step-num {
  background: var(--amber);
  color: var(--bg);
  border-color: var(--amber);
  font-weight: 700;
}
.step-item.done .step-num {
  background: #065f46;
  color: var(--green);
  border-color: #065f46;
}
.step-label {
  font-size: 13px;
  color: var(--text-3);
  line-height: 1.3;
}
.step-item.active .step-label { color: var(--text-2); font-weight: 500; }
.step-item.done .step-label  { color: var(--text-5); }

/* ── Main ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#content {
  flex: 1;
  overflow-y: auto;
  padding: 40px 52px;
  max-width: 800px;
}

/* ── OS picker ── */
#os-picker {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  gap: 32px;
  padding: 40px;
}
#os-picker h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-1);
}
#os-picker p { color: var(--text-3); font-size: 14px; }
.os-cards {
  display: flex;
  gap: 20px;
}
.os-card {
  background: var(--surface-2);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 28px 36px;
  cursor: pointer;
  text-align: center;
  min-width: 180px;
  transition: border-color 0.15s, background 0.15s;
}
.os-card:hover {
  border-color: var(--amber);
  background: var(--surface-3);
}
.os-card .os-icon { font-size: 40px; margin-bottom: 12px; }
.os-card h3 { font-size: 16px; color: var(--text-1); font-weight: 600; }
.os-card p  { font-size: 12px; color: var(--text-3); margin-top: 4px; }

/* ── Step content ── */
.step-tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 8px;
}
.step-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 8px;
}
.step-desc {
  font-size: 14px;
  color: var(--text-3);
  line-height: 1.7;
  margin-bottom: 28px;
  max-width: 560px;
}
.instruction { margin-bottom: 20px; }
.instruction-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-4);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.instruction p, .instruction ol, .instruction ul {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.7;
}
.instruction ol, .instruction ul { padding-left: 20px; }

/* Code block */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 20px;
  overflow: hidden;
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.code-lang {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-5);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.copy-btn {
  font-size: 11px;
  color: var(--amber);
  background: none;
  border: 1px solid var(--text-5);
  border-radius: 4px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.1s;
}
.copy-btn:hover { background: var(--surface-3); }
.code-body {
  padding: 14px 16px;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 13px;
  color: var(--code-fg);
  line-height: 1.7;
  white-space: pre;
  overflow-x: auto;
}

/* Callout */
.callout {
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--amber);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-3);
  line-height: 1.7;
  margin-bottom: 20px;
}
.callout strong { color: var(--amber); }
.callout code {
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 12px;
  background: var(--surface-1);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text-2);
}

/* Verify block */
.verify-block {
  background: var(--green-bg);
  border: 1px solid var(--green-bdr);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 20px;
}
.verify-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.verify-block .code-body {
  padding: 0;
  background: none;
  color: #6ee7b7;
}

/* Done state */
#done-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
  text-align: center;
}
#done-screen .done-icon { font-size: 56px; }
#done-screen h2 { font-size: 24px; font-weight: 700; color: var(--text-1); }
#done-screen p  { font-size: 14px; color: var(--text-3); max-width: 420px; line-height: 1.7; }

/* ── Footer nav ── */
#footer-nav {
  border-top: 1px solid var(--border);
  padding: 0 52px;
  height: var(--footer-h);
  align-items: center;
  justify-content: space-between;
  background: var(--surface-1);
  flex-shrink: 0;
  display: none;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: background 0.1s;
}
.btn-prev {
  background: var(--surface-3);
  color: var(--text-3);
  border: 1px solid var(--border);
}
.btn-prev:hover { background: var(--surface-2); }
.btn-next {
  background: var(--amber);
  color: var(--bg);
}
.btn-next:hover { background: var(--amber-dim); }
#nav-step-info { font-size: 12px; color: var(--text-5); }
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-title">Brelly <span>/ Map Pipeline Setup</span></div>
  <div id="os-badge">
    OS: <strong id="os-label"></strong> &nbsp;·&nbsp;
    <button id="os-switch-btn">switch</button>
  </div>
</div>

<div id="app-body">
  <aside id="sidebar">
    <div class="sidebar-section-label">Steps</div>
    <div id="progress-wrap"><div id="progress-fill"></div></div>
    <div id="progress-label"></div>
    <ul id="step-list"></ul>
  </aside>

  <div id="main">
    <div id="content">
      <!-- OS picker shown first; replaced by step content after OS selected -->
    </div>
    <div id="footer-nav">
      <button class="nav-btn btn-prev" id="btn-prev">← <span id="prev-label"></span></button>
      <span id="nav-step-info"></span>
      <button class="nav-btn btn-next" id="btn-next"><span id="next-label"></span> →</button>
    </div>
  </div>
</div>

<script>
// Step data and app logic go here in later tasks
</script>
</body>
</html>
